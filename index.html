<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="식물관리">
<meta name="theme-color" content="#4a7c59">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🌿 식물 물주기 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f2ed;--bg2:#ede9e2;--card:#fff;--card2:#faf8f5;
  --text:#2d2a25;--text2:#6b6560;--text3:#9e9990;--border:#e0dbd3;
  --green:#4a7c59;--green-light:#e8f2ec;
  --urgent:#E24B4A;--urgent-bg:#fdeaea;
  --today:#EF9F27;--today-bg:#fef4e3;
  --snooze:#7F77DD;--snooze-bg:#f0effe;
  --ok:#9e9990;--ok-bg:#f2f0ec;
  --upcoming:#4a7c59;--upcoming-bg:#e8f2ec;
  --shadow:0 2px 12px rgba(0,0,0,.06);
  --radius:16px;--radius-sm:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1916;--bg2:#222019;--card:#2a2822;--card2:#252320;
  --text:#ede9e2;--text2:#a09990;--text3:#6b6560;--border:#3a3830;
  --green-light:#1e2e23;--urgent-bg:#2e1a1a;--today-bg:#2e2215;
  --snooze-bg:#201e35;--ok-bg:#252320;--upcoming-bg:#1e2e23;
  --shadow:0 2px 12px rgba(0,0,0,.3);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}

/* HEADER — not sticky, scrolls with content */
.header{background:var(--card);padding:20px 20px 0;border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.app-title{font-family:'Gowun Dodum',serif;font-size:22px;color:var(--green);letter-spacing:-.5px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.date-main{font-size:15px;font-weight:500;color:var(--text);text-align:right}
.date-day{font-size:12px;color:var(--text2);margin-top:1px;text-align:right}
.settings-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px;color:var(--text3);line-height:1;margin-top:2px}
.weather-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:14px;font-size:13px;color:var(--text2)}
.weather-emoji{font-size:18px}
.weather-loading{color:var(--text3);font-style:italic;font-size:12px}

/* SUMMARY — 3 cards: emergency / today / upcoming */
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.summary-card{background:var(--card2);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;border:1.5px solid var(--border);cursor:pointer;transition:transform .15s}
.summary-card:active{transform:scale(.97)}
.summary-num{font-size:24px;font-weight:700;line-height:1}
.summary-label{font-size:10px;color:var(--text2);margin-top:3px}
.summary-card.s-urgent .summary-num{color:var(--urgent)}
.summary-card.s-today .summary-num{color:var(--today)}
.summary-card.s-upcoming .summary-num{color:var(--upcoming)}

/* FILTER ROW */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.filter-divider{width:1px;background:var(--border);flex-shrink:0;margin:4px 2px}

/* SORT ROW */
.sort-row{display:flex;gap:6px;align-items:center;padding-bottom:14px;overflow-x:auto;scrollbar-width:none}
.sort-row::-webkit-scrollbar{display:none}
.sort-label{font-size:11px;color:var(--text3);flex-shrink:0}
.sort-btn{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.sort-btn.active{background:var(--snooze);border-color:var(--snooze);color:#fff}

/* SEARCH BAR */
.search-bar{display:none;padding:0 16px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.search-bar.open{display:block}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--radius-sm);padding:8px 12px}
.search-input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);font-family:inherit;outline:none}
.search-input::placeholder{color:var(--text3)}
.search-clear{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3);padding:0;line-height:1}

/* SECTION HEADER */
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin:8px 0 12px;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);border-left:4px solid var(--green);box-shadow:var(--shadow)}
.section-header-info{flex:1;min-width:0}
.section-title{font-size:13px;font-weight:600;color:var(--text)}
.section-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.section-edit-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--text3);cursor:pointer;white-space:nowrap;margin-left:8px;flex-shrink:0;font-family:inherit}

/* PLANT CARD */
.plant-list{padding:16px}
.plant-card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;border-left:4px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;overflow:hidden}
.plant-card:active{transform:scale(.99);box-shadow:none}
.plant-card.urgent{border-left-color:var(--urgent)}
.plant-card.today{border-left-color:var(--today)}
.plant-card.snooze{border-left-color:var(--snooze);opacity:.82}
.plant-card.ok{border-left-color:var(--border)}
.plant-card.upcoming{border-left-color:var(--upcoming)}
.card-inner{padding:13px 14px 0}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.card-left{display:flex;gap:10px;align-items:flex-start;flex:1;min-width:0}
.plant-icon{font-size:28px;line-height:1;flex-shrink:0}
.plant-info{flex:1;min-width:0}
.plant-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plant-type{font-size:11px;color:var(--text2);margin-top:1px}
.plant-interval{font-size:11px;color:var(--text3)}
.plant-loc-tag{font-size:10px;color:var(--text3);margin-top:2px}
.plant-memo{font-size:11px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.status-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-urgent{background:var(--urgent-bg);color:var(--urgent)}
.badge-today{background:var(--today-bg);color:var(--today)}
.badge-snooze{background:var(--snooze-bg);color:var(--snooze)}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-upcoming{background:var(--upcoming-bg);color:var(--upcoming)}
.care-row{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.care-badge{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.cb-disease{background:#f0f0fb;color:#7060cc}
.cb-pest{background:#fff4e8;color:#c07020}
.cb-nutri{background:#eaf6ea;color:#2d7a2d}
.cb-pesticide{background:#fdf0f0;color:#b03030}
@media(prefers-color-scheme:dark){
  .cb-disease{background:#22204a;color:#b0a0ff}
  .cb-pest{background:#3a2800;color:#ffb060}
  .cb-nutri{background:#1a2e1a;color:#6dba6d}
  .cb-pesticide{background:#2e1a1a;color:#ff8080}
}
.progress-wrap{margin:8px 0 0;padding-bottom:13px}
.progress-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px}
.progress-bar{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.fill-ok{background:var(--green)}.fill-upcoming{background:var(--today)}.fill-urgent{background:var(--urgent)}.fill-snooze{background:var(--snooze)}

/* FAB area */
.fab-area{position:fixed;bottom:24px;right:calc(50% - 240px + 20px);display:flex;flex-direction:column;gap:10px;align-items:center;z-index:200}
@media(max-width:480px){.fab-area{right:20px}}
.fab{width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;font-size:26px;border:none;box-shadow:0 4px 16px rgba(74,124,89,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.93)}
.fab-search{width:44px;height:44px;border-radius:50%;background:var(--card);color:var(--text2);font-size:20px;border:1.5px solid var(--border);box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab-search:active{transform:scale(.93)}
.fab-search.active{background:var(--snooze);color:#fff;border-color:var(--snooze)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;transform:translateY(40px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);scrollbar-width:none}
.modal-box::-webkit-scrollbar{display:none}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.modal-plant-icon{font-size:36px}
.modal-title{font-size:18px;font-weight:700;color:var(--text)}
.modal-subtitle{font-size:12px;color:var(--text2);margin-top:2px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.detail-item{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px}
.detail-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.detail-value{font-size:14px;font-weight:500;color:var(--text)}
.memo-box{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.5}
.memo-label{font-size:10px;color:var(--text3);margin-bottom:4px}
.history-section{margin-bottom:16px}
.history-title{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:8px}
.history-list{display:flex;flex-wrap:wrap;gap:6px}
.history-chip{background:var(--green-light);color:var(--green);font-size:11px;padding:3px 8px;border-radius:20px}

/* CARE SECTION */
.care-section{margin-bottom:16px}
.care-section-title{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:8px}
.care-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.care-item{border-radius:var(--radius-sm);padding:10px;display:flex;flex-direction:column;gap:5px}
.care-item-disease{background:#f0f0fb}
.care-item-pest{background:#fff4e8}
.care-item-nutri{background:#eaf6ea}
.care-item-pesticide{background:#fdf0f0}
@media(prefers-color-scheme:dark){
  .care-item-disease{background:#22204a}
  .care-item-pest{background:#2e1e00}
  .care-item-nutri{background:#1a2e1a}
  .care-item-pesticide{background:#2e1a1a}
}
.care-item-header{display:flex;align-items:center;gap:4px}
.care-item-icon{font-size:13px}
.care-item-label{font-size:10px;font-weight:600;color:var(--text2)}
.care-item-value{font-size:11px;font-weight:500;color:var(--text);line-height:1.3}
.care-record-btn{border:none;border-radius:20px;padding:4px 8px;font-size:10px;font-family:inherit;cursor:pointer;font-weight:500}
.care-record-btn:active{opacity:.7}
.crb-disease{background:#7060cc;color:#fff}
.crb-pest{background:#c07020;color:#fff}
.crb-nutri{background:#2d7a2d;color:#fff}
.crb-pesticide{background:#b03030;color:#fff}

/* BUTTONS */
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.modal-actions-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{padding:11px 14px;border-radius:var(--radius-sm);border:none;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}
.btn:active{transform:scale(.97)}
.btn-water{background:#2196F3;color:#fff;grid-column:1/-1;font-size:14px;padding:13px}
.btn-snooze{background:var(--snooze-bg);color:var(--snooze)}
.btn-edit{background:var(--bg2);color:var(--text)}
.btn-delete{background:#fdeaea;color:var(--urgent)}
.btn-cancel{background:var(--bg2);color:var(--text)}
.btn-save{background:var(--green);color:#fff}
.btn-primary{background:var(--green);color:#fff}
.btn-full{grid-column:1/-1}
.btn-export{background:var(--upcoming-bg);color:var(--green)}
.btn-import{background:var(--today-bg);color:var(--today)}

/* SNOOZE */
.snooze-picker{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.snooze-title{font-size:13px;font-weight:600;margin-bottom:10px}
.snooze-options{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.snooze-opt{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:12px;cursor:pointer;color:var(--text);font-family:inherit;transition:all .15s}
.snooze-opt.selected{background:var(--snooze);border-color:var(--snooze);color:#fff}
.snooze-custom-row{display:flex;gap:8px;align-items:center}
.snooze-input{width:70px;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:13px;color:var(--text);font-family:inherit;text-align:center}
.snooze-input:focus{outline:none;border-color:var(--snooze)}
.snooze-unit{font-size:12px;color:var(--text2)}

/* FORM */
.form-section{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--green)}
.form-textarea{resize:none;height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ICON PICKER — swipeable 2 pages */
.icon-picker-wrap{margin-bottom:4px;overflow:hidden}
.icon-pages{display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.icon-page{min-width:100%;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.icon-opt{aspect-ratio:1;border-radius:10px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:var(--bg2);transition:border-color .1s,transform .1s}
.icon-opt.selected{border-color:var(--green);background:var(--green-light);transform:scale(1.05)}
.icon-page-dots{display:flex;justify-content:center;gap:6px;margin:6px 0 4px}
.icon-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s;cursor:pointer}
.icon-dot.active{background:var(--green)}

/* 장소 X 옵션 */
.loc-select-wrap{position:relative}
.loc-clear-btn{position:absolute;right:36px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:var(--text3);cursor:pointer;padding:0;line-height:1}

/* SETTINGS */
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.manage-item{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.manage-info{flex:1;min-width:0}
.manage-name{font-size:13px;font-weight:600;color:var(--text)}
.manage-desc{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.manage-btns{display:flex;gap:5px;flex-shrink:0;margin-left:8px}
.manage-btn{border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:10px;color:var(--text2);background:var(--card);cursor:pointer;font-family:inherit}
.manage-btn.del{border-color:#fca5a5;color:var(--urgent);background:#fff8f8}
@media(prefers-color-scheme:dark){.manage-btn.del{background:#2e1a1a}}
.add-manage-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:1.5px dashed var(--border);background:transparent;font-size:12px;color:var(--text3);cursor:pointer;font-family:inherit;margin-top:4px}
.edit-form-box{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;margin-top:8px}
.edit-form-box-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}

/* DATA */
.data-box{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.data-box-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.data-box-desc{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.import-textarea{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:11px;font-family:monospace;height:80px;resize:none;margin-bottom:8px}
.import-textarea:focus{outline:none;border-color:var(--green)}

/* ETC */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px}
.next-water-preview{font-size:12px;color:var(--text2);background:var(--green-light);padding:8px 12px;border-radius:8px;margin-top:8px}
.next-water-preview span{color:var(--green);font-weight:600}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d2a25;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.divider{height:1px;background:var(--border);margin:12px 0}
select option{background:var(--card)}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">🌿 식물 물주기</div>
      <div class="header-right">
        <div class="date-main" id="dateMain"></div>
        <div class="date-day" id="dateDay"></div>
        <button class="settings-btn" onclick="openSettingsModal()">⚙️</button>
      </div>
    </div>
    <div class="weather-bar">
      <span class="weather-emoji" id="weatherEmoji">🌤</span>
      <span id="weatherData" class="weather-loading">날씨 불러오는 중…</span>
    </div>

    <!-- 1. 요약 카드: 긴급/오늘/3일이내 -->
    <div class="summary-row">
      <div class="summary-card s-urgent" onclick="setStatFilter('urgent')">
        <div class="summary-num" id="numUrgent">0</div>
        <div class="summary-label">Emergency</div>
      </div>
      <div class="summary-card s-today" onclick="setStatFilter('today')">
        <div class="summary-num" id="numToday">0</div>
        <div class="summary-label">Today</div>
      </div>
      <div class="summary-card s-upcoming" onclick="setStatFilter('upcoming')">
        <div class="summary-num" id="numUpcoming">0</div>
        <div class="summary-label">Upcoming</div>
      </div>
    </div>

    <!-- 2. 필터: 상태만 (장소 탭 제거) -->
    <div class="filter-row" id="filterRow">

  {id:16,icon:'🎋',name:'나비란',              type:'화초',   interval:10,lastWater:'2026-03-20',location:'e', memo:'뿌리 통기 중요, 충분히 마른 후',history:['2026-03-20'],lastDisease:'2026-03-11',lastPest:'2026-03-20'},

  {id:20,icon:'🌱',name:'스킨답서스',          type:'관엽식물',interval:10,lastWater:'2026-03-17',location:'e', memo:'겉흙 완전히 마르면 물주기',history:[]}
];

let plants=[], locs=[], cares=[];
let statFilter='all', sortMode='status', searchQuery='', activeDetailId=null, snoozeSelectedDays=2;
let iconPage=0; // 현재 아이콘 페이지

// ── 유틸 ────────────────────────────────────────────
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function addDays(s,n){const d=parseDate(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function diffDays(a,b){return Math.round((parseDate(a)-parseDate(b))/86400000)}
function formatDate(s){if(!s)return'-';const d=parseDate(s);return`${d.getMonth()+1}/${d.getDate()}`}
function getLocLabel(locId){if(!locId)return'장소 없음';const l=locs.find(x=>x.id===locId);return l?l.label:'장소 없음'}
function getLocDesc(locId){if(!locId)return'';const l=locs.find(x=>x.id===locId);return l?l.desc:''}
function getCareKey(careId){return'last_'+careId}

// ── 상태 ────────────────────────────────────────────
function getStatus(p){
  const t=today();
  if(p.snoozeUntil&&p.snoozeUntil>t)return'snooze';
  const diff=diffDays(addDays(p.lastWater,p.interval),t);
  if(diff<0)return'urgent';if(diff===0)return'today';if(diff<=3)return'upcoming';return'ok';
}
function getStatusLabel(s,p){
  if(s==='snooze')return`💤 D+${diffDays(p.snoozeUntil,today())}`;
  const diff=diffDays(addDays(p.lastWater,p.interval),today());
  if(s==='urgent')return`🚨 D${diff}`;if(s==='today')return'💧 오늘';
  if(s==='upcoming')return`🌱 D-${diff}`;return`✅ D-${diff}`;
}
function getStatusOrder(s){return{urgent:0,today:1,snooze:2,upcoming:3,ok:4}[s]??5}
function getSortKey(p){const s=getStatus(p);const diff=diffDays(addDays(p.lastWater,p.interval),today());return[getStatusOrder(s),diff]}

// ── 저장 ────────────────────────────────────────────
async function loadData(){
  try{const r=localStorage.getItem(STORAGE_KEY);plants=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_PLANTS))}
  catch(e){plants=JSON.parse(JSON.stringify(DEFAULT_PLANTS))}
  try{const r=localStorage.getItem(LOCS_KEY);locs=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_LOCS))}
  catch(e){locs=JSON.parse(JSON.stringify(DEFAULT_LOCS))}
  try{const r=localStorage.getItem(CARES_KEY);cares=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_CARES))}
  catch(e){cares=JSON.parse(JSON.stringify(DEFAULT_CARES))}
}
async function savePlants(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(plants))}catch(e){}}
async function saveLocs(){try{localStorage.setItem(LOCS_KEY,JSON.stringify(locs))}catch(e){}}
async function saveCares(){try{localStorage.setItem(CARES_KEY,JSON.stringify(cares))}catch(e){}}

// ── 헤더/날씨 ────────────────────────────────────────
function updateHeader(){
  const d=new Date();
  document.getElementById('dateMain').textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('dateDay').textContent=DAYS_KO[d.getDay()];
}
async function fetchWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia%2FSeoul');
    const data=await r.json();const c=data.current;
    document.getElementById('weatherEmoji').textContent=wCode(c.weather_code);
    document.getElementById('weatherData').textContent=`${Math.round(c.temperature_2m)}°C  💧 ${c.relative_humidity_2m}%  서울 현재 날씨`;
    document.getElementById('weatherData').classList.remove('weather-loading');
  }catch(e){document.getElementById('weatherData').textContent='날씨를 불러올 수 없습니다'}
}
function wCode(c){
  if(c===0)return'☀️';if(c<=2)return'🌤';if(c<=3)return'☁️';if(c<=48)return'🌫';
  if(c<=67)return'🌧';if(c<=77)return'❄️';if(c<=82)return'🌦';return'⛈';
}

// ── 요약 업데이트 ────────────────────────────────────
function updateSummary(){
  let u=0,t=0,up=0;
  plants.forEach(p=>{
    const s=getStatus(p);
    if(s==='urgent')u++;
    if(s==='today')t++;
    if(s==='upcoming')up++;
  });
  document.getElementById('numUrgent').textContent=u;
  document.getElementById('numToday').textContent=t;
  document.getElementById('numUpcoming').textContent=up;
}

// ── 3. 검색 ─────────────────────────────────────────
function toggleSearch(){
  const bar=document.getElementById('searchBar');
  const btn=document.getElementById('fabSearch');
  const open=!bar.classList.contains('open');
  bar.classList.toggle('open',open);
  btn.classList.toggle('active',open);
  if(open)setTimeout(()=>document.getElementById('searchInput').focus(),100);
  else{document.getElementById('searchInput').value='';searchQuery='';renderPlants();}
}
function clearSearch(){
  document.getElementById('searchInput').value='';searchQuery='';renderPlants();
  document.getElementById('searchInput').focus();
}

// ── 렌더링 ───────────────────────────────────────────
function renderPlants(){
  updateSummary();
  searchQuery=document.getElementById('searchInput').value.trim().toLowerCase();
  const list=document.getElementById('plantList');list.innerHTML='';

  let filtered=plants.filter(p=>{
    const s=getStatus(p);
    if(statFilter==='urgent'&&s!=='urgent')return false;
    if(statFilter==='today'&&s!=='today')return false;
    if(statFilter==='upcoming'&&s!=='upcoming'&&s!=='snooze')return false;
    if(statFilter==='ok'&&s!=='ok')return false;
    // 3. 검색 필터 (이름 또는 장소)
    if(searchQuery){
      const nameMatch=p.name.toLowerCase().includes(searchQuery);
      const locLabel=getLocLabel(p.location).toLowerCase();
      const locMatch=locLabel.includes(searchQuery);
      if(!nameMatch&&!locMatch)return false;
    }
    return true;
  });

  filtered.sort((a,b)=>{
    if(sortMode==='alpha')return a.name.localeCompare(b.name,'ko');
    const[oa,da]=getSortKey(a),[ob,db]=getSortKey(b);
    if(oa!==ob)return oa-ob;
    if(da!==db)return da-db;
    return a.name.localeCompare(b.name,'ko');
  });

  if(!filtered.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">🌵</div><div class="empty-text">해당하는 식물이 없어요</div></div>';
    return;
  }
  filtered.forEach(p=>list.appendChild(buildCard(p)));
}

function buildCard(p){
  const status=getStatus(p),next=addDays(p.lastWater,p.interval);
  const elapsed=diffDays(today(),p.lastWater),progress=Math.min(Math.round(elapsed/p.interval*100),100);
  const diff=diffDays(next,today()),label=getStatusLabel(status,p);
  const fillClass=status==='urgent'?'fill-urgent':status==='today'?'fill-upcoming':status==='snooze'?'fill-snooze':progress>70?'fill-upcoming':'fill-ok';
  const badgeClass={urgent:'badge-urgent',today:'badge-today',snooze:'badge-snooze',ok:'badge-ok',upcoming:'badge-upcoming'}[status];
  const nextStr=status==='snooze'?`미루기 중 (${formatDate(p.snoozeUntil)}까지)`:diff===0?'오늘':diff<0?`${-diff}일 지남`:`${diff}일 후`;
  const memoHtml=p.memo?`<div class="plant-memo">💡 ${p.memo}</div>`:'';
  const locHtml=p.location?`<div class="plant-loc-tag">📍 ${getLocLabel(p.location)}</div>`:'';

  // 관리제 배지 동적 생성
  const careBadges=cares.map(c=>{
    const key=getCareKey(c.id);const val=p[key];
    if(!val)return'';
    const d=diffDays(today(),val);
    return`<span class="care-badge ${c.colorClass}">${c.icon} D+${d}</span>`;
  }).join('');

  const card=document.createElement('div');card.className=`plant-card ${status}`;
  card.onclick=()=>openDetail(p.id);
  card.innerHTML=`<div class="card-inner"><div class="card-top"><div class="card-left"><div class="plant-icon">${p.icon}</div><div class="plant-info"><div class="plant-name">${p.name}</div><div class="plant-type">${p.type} · ${p.interval}일 간격</div><div class="plant-interval">다음: ${nextStr}</div>${locHtml}${memoHtml}</div></div><div class="card-right"><span class="status-badge ${badgeClass}">${label}</span><div class="care-row">${careBadges}</div></div></div><div class="progress-wrap"><div class="progress-meta"><span>마지막: ${formatDate(p.lastWater)}</span><span>${progress}%</span></div><div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${progress}%"></div></div></div></div>`;
  return card;
}

function openDetail(id){
  const p=plants.find(x=>x.id===id);if(!p)return;
  activeDetailId=id;
  const status=getStatus(p),next=addDays(p.lastWater,p.interval),diff=diffDays(next,today());
  document.getElementById('dm-icon').textContent=p.icon;
  document.getElementById('dm-name').textContent=p.name;
  document.getElementById('dm-sub').textContent=`${p.type}${p.location?' · '+getLocLabel(p.location):''}`;
  document.getElementById('dm-interval').textContent=`${p.interval}일마다`;
  document.getElementById('dm-last').textContent=p.lastWater;
  document.getElementById('dm-next').textContent=next;
  const st={urgent:`🚨 ${-diff}일 지남`,today:'💧 오늘',snooze:'💤 미루기 중',upcoming:`🌱 ${diff}일 후`,ok:`✅ ${diff}일 후`};
  document.getElementById('dm-status').textContent=st[status];
  const mw=document.getElementById('dm-memo-wrap');
  if(p.memo){mw.style.display='';document.getElementById('dm-memo').textContent=p.memo}else mw.style.display='none';
  const entries=(p.history||[]).slice(-6).reverse();
  document.getElementById('dm-history').innerHTML=entries.length?entries.map(d=>`<span class="history-chip">💧 ${d}</span>`).join(''):'<span style="font-size:12px;color:var(--text3)">기록 없음</span>';

  // 관리제 동적 렌더링
  const grid=document.getElementById('dm-care-grid');
  grid.innerHTML=cares.map(c=>{
    const key=getCareKey(c.id);const val=p[key];
    const txt=val?`${val} (D+${diffDays(today(),val)})`:'기록 없음';
    return`<div class="care-item ${c.itemClass}">
      <div class="care-item-header"><span class="care-item-icon">${c.icon}</span><span class="care-item-label">${c.label}</span></div>
      <div class="care-item-value" id="dm-care-${c.id}">${txt}</div>
      <button class="care-record-btn ${c.btnClass}" onclick="recordCare('${c.id}')">오늘 투여</button>
    </div>`;
  }).join('');

  document.getElementById('snoozePicker').style.display='none';
  snoozeSelectedDays=2;
  document.querySelectorAll('.snooze-opt').forEach(b=>b.classList.toggle('selected',parseInt(b.textContent)===2));
  document.getElementById('snoozeCustom').value=2;
  openModal('detailModal');
}

async function waterPlant(){
  const p=plants.find(x=>x.id===activeDetailId);if(!p)return;
  const t=today();p.history=p.history||[];
  if(!p.history.includes(t))p.history.push(t);if(p.history.length>20)p.history=p.history.slice(-20);
  p.lastWater=t;delete p.snoozeUntil;await savePlants();closeModal('detailModal');renderPlants();showToast(`💧 ${p.name} 물주기 완료!`);
}
function toggleSnoozePicker(){const el=document.getElementById('snoozePicker');el.style.display=el.style.display==='none'?'':'none'}
function selectSnoozeOpt(days,btn){snoozeSelectedDays=days;document.querySelectorAll('.snooze-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById('snoozeCustom').value=days}
function syncSnoozeCustom(input){snoozeSelectedDays=parseInt(input.value)||1;document.querySelectorAll('.snooze-opt').forEach(b=>b.classList.remove('selected'))}
async function confirmSnooze(){
  const days=parseInt(document.getElementById('snoozeCustom').value)||snoozeSelectedDays;

  p.snoozeUntil=addDays(today(),days);await savePlants();closeModal('detailModal');renderPlants();showToast(`💤 ${p.name} ${days}일 후로 미룸`);
}
async function deletePlant(){

async function recordCare(careId){

function buildPlantForm(p){
  const d=p||{icon:ICONS_P1[0],name:'',type:'',interval:7,lastWater:today(),location:locs[0]?.id||'',memo:''};
  // 6. 장소 옵션 + X(없음)
  const locOptions=`<option value=""${!d.location?' selected':''}>— 장소 없음 —</option>`
    +locs.map(l=>`<option value="${l.id}"${d.location===l.id?' selected':''}>${l.label}</option>`).join('');
  // 관리제 날짜 필드 동적 생성
  const careFields=cares.map((c,i)=>{
    const key=getCareKey(c.id);const val=d[key]||'';
    const isOdd=i%2===0;
    if(isOdd){
      const next=cares[i+1];
      const nextKey=next?getCareKey(next.id):'';const nextVal=next?d[nextKey]||'':'';
      if(next){
        return`<div class="form-row">
          <div class="form-section"><label class="form-label">${c.icon} ${c.label} 투여일</label><input class="form-input" type="date" id="f-care-${c.id}" value="${val}"></div>
          <div class="form-section"><label class="form-label">${next.icon} ${next.label} 투여일</label><input class="form-input" type="date" id="f-care-${next.id}" value="${nextVal}"></div>
        </div>`;
      }else{
        return`<div class="form-section"><label class="form-label">${c.icon} ${c.label} 투여일</label><input class="form-input" type="date" id="f-care-${c.id}" value="${val}"></div>`;
      }
    }
    return''; // 짝수는 위에서 처리
  }).filter(Boolean).join('');

  return`<div class="form-section"><label class="form-label">아이콘</label>${buildIconPicker(d.icon)}</div>
<div class="form-row"><div class="form-section"><label class="form-label">이름 *</label><input class="form-input" id="f-name" value="${d.name}" placeholder="식물 이름"></div><div class="form-section"><label class="form-label">종류</label><input class="form-input" id="f-type" value="${d.type||''}" placeholder="관엽식물"></div></div>
<div class="form-row"><div class="form-section"><label class="form-label">물주기 간격 (일)</label><input class="form-input" type="number" id="f-interval" value="${d.interval}" min="1" oninput="updateNextPreview()"></div><div class="form-section"><label class="form-label">마지막 물주기</label><input class="form-input" type="date" id="f-lastwater" value="${d.lastWater}" oninput="updateNextPreview()"></div></div>
<div class="form-section"><label class="form-label">장소</label><select class="form-select" id="f-location">${locOptions}</select></div>
${careFields}
<div class="form-section"><label class="form-label">메모</label><textarea class="form-textarea" id="f-memo" placeholder="물주기 조건 등">${d.memo||''}</textarea></div>
<div class="next-water-preview">다음 물주기 예정: <span id="nextPreviewDate">${addDays(d.lastWater,d.interval)}</span></div>`;
}

async function importData(){
  const raw=document.getElementById('importTextarea').value.trim();
  if(!raw){showToast('⚠️ 데이터를 붙여넣어 주세요');return}
  try{
    const parsed=JSON.parse(raw);
    if(!parsed.plants||!Array.isArray(parsed.plants))throw new Error();
    if(!confirm(`식물 ${parsed.plants.length}개를 가져옵니다.\n현재 데이터가 모두 덮어씌워집니다. 계속할까요?`))return;
    plants=parsed.plants;
    if(parsed.locs)locs=parsed.locs;
    else if(parsed.locDescs){locs=DEFAULT_LOCS.map(l=>({...l,desc:parsed.locDescs[l.id]||l.desc}))}
    if(parsed.cares)cares=parsed.cares;
    // 구버전 호환: lastDisease/lastPest/lastNutri/lastPesticide → last_disease 등으로 마이그레이션
    plants.forEach(p=>{
      if(p.lastDisease!==undefined&&p['last_disease']===undefined){p['last_disease']=p.lastDisease;delete p.lastDisease}
      if(p.lastPest!==undefined&&p['last_pest']===undefined){p['last_pest']=p.lastPest;delete p.lastPest}
      if(p.lastNutri!==undefined&&p['last_nutri']===undefined){p['last_nutri']=p.lastNutri;delete p.lastNutri}
      if(p.lastPesticide!==undefined&&p['last_pesticide']===undefined){p['last_pesticide']=p.lastPesticide;delete p.lastPesticide}
    });
    await savePlants();await saveLocs();await saveCares();
    closeModal('settingsModal');renderPlants();showToast(`✅ ${plants.length}개 식물 가져오기 완료!`);
  }catch(e){alert('올바른 형식이 아닙니다.\n내보낸 JSON 내용을 그대로 붙여넣어 주세요.')}
}

// ── 필터/정렬 ────────────────────────────────────────
function setStatFilter(val){
  statFilter=val;
  ['all','urgent','today','upcoming','ok'].forEach(s=>{const el=document.getElementById(`tabStat-${s}`);if(el)el.classList.toggle('active',s===val)});
  renderPlants();
}
function setSortMode(val,btn){
  sortMode=val;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderPlants();
}

// ── 모달 헬퍼 ────────────────────────────────────────
function openModal(id){const el=document.getElementById(id);el.style.display='flex';requestAnimationFrame(()=>el.classList.add('open'));document.body.style.overflow='hidden'}
function closeModal(id){const el=document.getElementById(id);el.classList.remove('open');setTimeout(()=>{el.style.display='none'},250);document.body.style.overflow=''}
function handleOverlayClick(e,id){if(e.target===document.getElementById(id))closeModal(id)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// ── 구버전 데이터 마이그레이션 ───────────────────────
function migrateOldCareKeys(){
  // lastDisease → last_disease 등 키 변환
  const map={lastDisease:'last_disease',lastPest:'last_pest',lastNutri:'last_nutri',lastPesticide:'last_pesticide'};
  let changed=false;
  plants.forEach(p=>{
    Object.entries(map).forEach(([oldKey,newKey])=>{
      if(p[oldKey]!==undefined&&p[newKey]===undefined){p[newKey]=p[oldKey];delete p[oldKey];changed=true;}
    });
  });
  if(changed)savePlants();
}

// ── 초기화 ───────────────────────────────────────────
(async()=>{
  await loadData();
  migrateOldCareKeys();
  updateHeader();fetchWeather();renderPlants();
  setInterval(updateHeader,60000);setInterval(fetchWeather,600000);
})();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
